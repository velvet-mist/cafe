<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Study Planner</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="../style/base.css">
  <link rel="stylesheet" href="../style/components.css">
  <style>
    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .assignment-input { display: flex; gap: 8px; margin-bottom: 12px; }
    .assignment-input input {
      flex: 1; background: var(--tan-light); border: 1.5px solid var(--tan);
      border-radius: var(--radius-pill); padding: 6px 12px;
      font-family: var(--font-body); font-size: 0.82rem; color: var(--brown); outline: none;
    }
    .assignment-input input:focus { border-color: var(--accent); }
    .add-btn {
      background: var(--accent); color: white; border: none;
      border-radius: var(--radius-pill); width: 28px; height: 28px;
      font-size: 1.1rem; cursor: pointer; display: flex;
      align-items: center; justify-content: center;
      font-weight: bold; transition: transform 0.1s; flex-shrink: 0;
    }
    .add-btn:hover { transform: scale(1.1); }
    .assignment-list { list-style: none; display: flex; flex-direction: column; gap: 6px; }
    .assignment-item {
      display: flex; align-items: center; gap: 8px; padding: 8px 10px;
      background: var(--warm-white); border: 1.5px solid var(--tan);
      border-radius: var(--radius-md); animation: fadeUp 0.2s ease;
    }
    .assignment-item input[type="checkbox"] {
      appearance: none; width: 16px; height: 16px;
      border: 2px solid var(--brown-light); border-radius: 5px;
      background: var(--cream-light); cursor: pointer; flex-shrink: 0; position: relative;
    }
    .assignment-item input[type="checkbox"]:checked { background: var(--accent); border-color: var(--accent); }
    .assignment-item input[type="checkbox"]:checked::after {
      content: '✓'; position: absolute; top: 50%; left: 50%;
      transform: translate(-50%,-50%); font-size: 9px; color: white; font-weight: bold;
    }
    .assignment-item .text { flex: 1; font-size: 0.82rem; }
    .assignment-item.done .text { text-decoration: line-through; color: var(--muted); }
    .priority-badge { font-size: 0.62rem; font-family: var(--font-display); font-weight: 700; padding: 2px 8px; border-radius: var(--radius-pill); flex-shrink: 0; }
    .priority-high { background: #ffe0e0; color: #c0392b; }
    .priority-mid  { background: #fff3cd; color: #8b6000; }
    .priority-low  { background: #e0f0e0; color: #2d6a2d; }
    .del { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 0.85rem; opacity: 0; transition: opacity 0.15s; }
    .assignment-item:hover .del { opacity: 1; }
    .del:hover { color: var(--accent); }
    .schedule-table { width: 100%; border-collapse: collapse; }
    .schedule-table th {
      font-family: var(--font-display); font-size: 0.68rem; font-weight: 800;
      letter-spacing: 1px; text-transform: uppercase; color: var(--brown);
      padding: 6px 10px; text-align: left; background: var(--tan);
    }
    .schedule-table td { padding: 6px 10px; border-bottom: 1.5px dashed var(--tan); }
    .schedule-table td input {
      width: 100%; background: transparent; border: none; outline: none;
      font-family: var(--font-body); font-size: 0.82rem; color: var(--brown);
    }
    .schedule-table td input::placeholder { color: var(--muted); opacity: 0.5; }
    select {
      background: var(--tan-light); border: 1.5px solid var(--tan);
      border-radius: var(--radius-pill); padding: 5px 10px;
      font-family: var(--font-body); font-size: 0.8rem; color: var(--brown); outline: none; cursor: pointer;
    }
    .save-bar { display: flex; justify-content: flex-end; margin-top: 12px; }
  </style>
</head>
<body>
<div class="page fade-up">
  <a class="back-nav" href="../index.html">← back</a>
  <div class="page-header">
    <div>
      <h1>✏️ Study Planner</h1>
      <div class="subtitle">stay ahead of the curve</div>
    </div>
  </div>

  <div class="two-col">
    <div class="card">
      <div class="card-title dots">assignments</div>
      <div class="assignment-input">
        <input type="text" id="assign-input" placeholder="assignment name..." onkeydown="if(event.key==='Enter') addAssignment()">
        <select id="priority-select">
          <option value="high">🔴 high</option>
          <option value="mid" selected>🟡 mid</option>
          <option value="low">🟢 low</option>
        </select>
        <button class="add-btn" onclick="addAssignment()">+</button>
      </div>
      <ul class="assignment-list" id="assignment-list"></ul>
    </div>

    <div class="card">
      <div class="card-title dots">class schedule</div>
      <table class="schedule-table">
        <thead><tr><th>day</th><th>subject</th><th>time</th></tr></thead>
        <tbody id="class-schedule-body">
          <tr><td><input data-day="Monday" data-field="day" placeholder="Monday" readonly style="color:var(--muted)"></td><td><input data-day="Monday" data-field="subject" placeholder="subject..."></td><td><input data-day="Monday" data-field="time" placeholder="9:00am"></td></tr>
          <tr><td><input data-day="Tuesday" data-field="day" placeholder="Tuesday" readonly style="color:var(--muted)"></td><td><input data-day="Tuesday" data-field="subject" placeholder="subject..."></td><td><input data-day="Tuesday" data-field="time" placeholder=""></td></tr>
          <tr><td><input data-day="Wednesday" data-field="day" placeholder="Wednesday" readonly style="color:var(--muted)"></td><td><input data-day="Wednesday" data-field="subject" placeholder="subject..."></td><td><input data-day="Wednesday" data-field="time" placeholder=""></td></tr>
          <tr><td><input data-day="Thursday" data-field="day" placeholder="Thursday" readonly style="color:var(--muted)"></td><td><input data-day="Thursday" data-field="subject" placeholder="subject..."></td><td><input data-day="Thursday" data-field="time" placeholder=""></td></tr>
          <tr><td><input data-day="Friday" data-field="day" placeholder="Friday" readonly style="color:var(--muted)"></td><td><input data-day="Friday" data-field="subject" placeholder="subject..."></td><td><input data-day="Friday" data-field="time" placeholder=""></td></tr>
        </tbody>
      </table>
      <div class="save-bar">
        <button class="btn" onclick="saveSchedule()">save schedule</button>
      </div>
    </div>
  </div>

  <div class="card" style="margin-top: 16px;">
    <div class="card-title dots">important notes</div>
    <div class="notes-block">
      <textarea id="study-notes" placeholder="write reminders, key formulas, or anything important..."></textarea>
    </div>
    <div class="save-bar">
      <button class="btn" onclick="saveNotes()">save notes</button>
    </div>
  </div>
</div>

<script>
  const API = 'http://localhost:8000/api/v1/planner';

  // ── ASSIGNMENTS ──
  async function loadAssignments() {
    const res = await fetch(`${API}/study/assignments`);
    const data = await res.json();
    renderAssignments(data);
  }

  function renderAssignments(assignments) {
    const list = document.getElementById('assignment-list');
    list.innerHTML = '';
    if (!assignments.length) {
      list.innerHTML = '<li style="color:var(--muted);font-size:0.8rem;text-align:center;padding:16px">no assignments yet ☕</li>';
      return;
    }
    assignments.forEach(a => {
      const li = document.createElement('li');
      li.className = 'assignment-item' + (a.done ? ' done' : '');
      const cb = document.createElement('input');
      cb.type = 'checkbox'; cb.checked = a.done;
      cb.onchange = () => toggleAssignment(a.id, !a.done);
      const text = document.createElement('span');
      text.className = 'text'; text.textContent = a.text;
      const badge = document.createElement('span');
      badge.className = `priority-badge priority-${a.priority}`;
      badge.textContent = a.priority;
      const del = document.createElement('button');
      del.className = 'del'; del.textContent = '✕';
      del.onclick = () => deleteAssignment(a.id);
      li.append(cb, text, badge, del);
      list.appendChild(li);
    });
  }

  async function addAssignment() {
    const input = document.getElementById('assign-input');
    const val = input.value.trim();
    if (!val) return;
    await fetch(`${API}/study/assignments`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text: val, priority: document.getElementById('priority-select').value })
    });
    input.value = '';
    loadAssignments();
  }

  async function toggleAssignment(id, done) {
    await fetch(`${API}/study/assignments/${id}`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ done })
    });
    loadAssignments();
  }

  async function deleteAssignment(id) {
    await fetch(`${API}/study/assignments/${id}`, { method: 'DELETE' });
    loadAssignments();
  }

  // ── CLASS SCHEDULE ──
  async function loadSchedule() {
    const res = await fetch(`${API}/study/schedule`);
    const slots = await res.json();
    const map = {};
    slots.forEach(s => map[s.day] = s);
    document.querySelectorAll('[data-field="subject"]').forEach(input => {
      const slot = map[input.dataset.day];
      if (slot) input.value = slot.subject || '';
    });
    document.querySelectorAll('[data-field="time"]').forEach(input => {
      const slot = map[input.dataset.day];
      if (slot) input.value = slot.time || '';
    });
  }

  async function saveSchedule() {
    const days = ['Monday','Tuesday','Wednesday','Thursday','Friday'];
    await Promise.all(days.map(day => {
      const subject = document.querySelector(`[data-day="${day}"][data-field="subject"]`).value;
      const time = document.querySelector(`[data-day="${day}"][data-field="time"]`).value;
      return fetch(`${API}/study/schedule`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ day, subject, time })
      });
    }));
  }

  // ── NOTES ──
  async function loadNotes() {
    const res = await fetch(`${API}/study/notes`);
    if (res.ok) {
      const data = await res.json();
      document.getElementById('study-notes').value = data ? data.body : '';
    }
  }

  async function saveNotes() {
    await fetch(`${API}/study/notes`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ body: document.getElementById('study-notes').value })
    });
  }

  loadAssignments();
  loadSchedule();
  loadNotes()</script> <script src="../script.js" defer></script></body></html>
