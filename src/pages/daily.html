<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Daily Planner</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="../style/base.css">
  <link rel="stylesheet" href="../style/components.css">
  <style>
    .date-bar { display: flex; align-items: center; gap: 10px; margin-bottom: 24px; }
    .date-bar input[type="date"] {
      background: var(--tan-light); border: 2px solid var(--tan);
      border-radius: var(--radius-pill); padding: 6px 16px;
      font-family: var(--font-display); font-size: 0.85rem;
      font-weight: 700; color: var(--brown); outline: none;
    }
    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .task-input-row { display: flex; gap: 8px; margin-bottom: 10px; }
    .task-input-row input {
      flex: 1; background: var(--tan-light); border: 1.5px solid var(--tan);
      border-radius: var(--radius-pill); padding: 6px 12px;
      font-family: var(--font-body); font-size: 0.82rem; color: var(--brown); outline: none;
    }
    .task-input-row input:focus { border-color: var(--accent); }
    .add-btn {
      background: var(--accent); color: white; border: none;
      border-radius: var(--radius-pill); width: 28px; height: 28px;
      font-size: 1.1rem; cursor: pointer; display: flex;
      align-items: center; justify-content: center;
      flex-shrink: 0; font-weight: bold; transition: transform 0.1s;
    }
    .add-btn:hover { transform: scale(1.1); }
    .task-list { list-style: none; display: flex; flex-direction: column; gap: 6px; }
    .task-item {
      display: flex; align-items: center; gap: 8px; padding: 7px 10px;
      background: var(--warm-white); border: 1.5px solid var(--tan);
      border-radius: var(--radius-md); animation: fadeUp 0.2s ease;
    }
    .task-item input[type="checkbox"] {
      appearance: none; width: 16px; height: 16px;
      border: 2px solid var(--brown-light); border-radius: 5px;
      background: var(--cream-light); cursor: pointer; flex-shrink: 0; position: relative;
    }
    .task-item input[type="checkbox"]:checked { background: var(--accent); border-color: var(--accent); }
    .task-item input[type="checkbox"]:checked::after {
      content: '✓'; position: absolute; top: 50%; left: 50%;
      transform: translate(-50%,-50%); font-size: 9px; color: white; font-weight: bold;
    }
    .task-item span { flex: 1; font-size: 0.82rem; }
    .task-item.done span { text-decoration: line-through; color: var(--muted); }
    .del { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 0.85rem; opacity: 0; transition: opacity 0.15s; }
    .task-item:hover .del { opacity: 1; }
    .del:hover { color: var(--accent); }
    .schedule-grid { display: flex; flex-direction: column; gap: 5px; }
    .time-slot { display: flex; align-items: center; gap: 8px; }
    .time-label { font-family: var(--font-display); font-size: 0.68rem; font-weight: 700; color: var(--muted); width: 38px; flex-shrink: 0; text-align: right; }
    .time-slot input {
      flex: 1; background: transparent; border: none;
      border-bottom: 1.5px dashed var(--brown-light); padding: 4px 4px;
      font-family: var(--font-body); font-size: 0.82rem; color: var(--brown); outline: none;
    }
    .time-slot input::placeholder { color: var(--muted); opacity: 0.5; }
    .save-bar { display: flex; justify-content: flex-end; margin-top: 12px; }
  </style>
</head>
<body>
<div class="page fade-up">
  <a class="back-nav" href="../index.html">← back</a>
  <div class="page-header">
    <div>
      <h1>📋 Daily Planner</h1>
      <div class="subtitle">one day at a time</div>
    </div>
  </div>

  <div class="date-bar">
    <span class="pill-label">📅</span>
    <input type="date" id="today-date" onchange="loadDay()">
  </div>

  <div class="two-col">
    <div class="card">
      <div class="card-title dots">tasks</div>
      <div class="task-input-row">
        <input type="text" id="task-input" placeholder="add a task..." onkeydown="if(event.key==='Enter') addTask()">
        <button class="add-btn" onclick="addTask()">+</button>
      </div>
      <ul class="task-list" id="task-list"></ul>
    </div>
    <div class="card">
      <div class="card-title dots">notes</div>
      <div class="notes-block" style="min-height: 180px;">
        <textarea id="notes-textarea" placeholder="jot anything down..."></textarea>
      </div>
      <div class="save-bar">
        <button class="btn" onclick="saveNotes()">save notes</button>
      </div>
    </div>
  </div>

  <div style="margin-top: 16px;">
    <div class="card">
      <div class="card-title dots">schedule</div>
      <div class="schedule-grid" id="schedule-grid">
        <div class="time-slot"><span class="time-label">7am</span><input data-hour="7am" type="text" placeholder="morning routine..."></div>
        <div class="time-slot"><span class="time-label">8am</span><input data-hour="8am" type="text" placeholder=""></div>
        <div class="time-slot"><span class="time-label">9am</span><input data-hour="9am" type="text" placeholder=""></div>
        <div class="time-slot"><span class="time-label">10am</span><input data-hour="10am" type="text" placeholder=""></div>
        <div class="time-slot"><span class="time-label">11am</span><input data-hour="11am" type="text" placeholder=""></div>
        <div class="time-slot"><span class="time-label">12pm</span><input data-hour="12pm" type="text" placeholder="lunch 🍱"></div>
        <div class="time-slot"><span class="time-label">1pm</span><input data-hour="1pm" type="text" placeholder=""></div>
        <div class="time-slot"><span class="time-label">2pm</span><input data-hour="2pm" type="text" placeholder=""></div>
        <div class="time-slot"><span class="time-label">3pm</span><input data-hour="3pm" type="text" placeholder=""></div>
        <div class="time-slot"><span class="time-label">4pm</span><input data-hour="4pm" type="text" placeholder=""></div>
        <div class="time-slot"><span class="time-label">5pm</span><input data-hour="5pm" type="text" placeholder=""></div>
        <div class="time-slot"><span class="time-label">6pm</span><input data-hour="6pm" type="text" placeholder="evening ☕"></div>
      </div>
      <div class="save-bar">
        <button class="btn" onclick="saveSchedule()">save schedule</button>
      </div>
    </div>
  </div>
</div>

<script>
  const API = 'http://localhost:8000/api/v1/planner';

  const dateInput = document.getElementById('today-date');
  dateInput.value = new Date().toISOString().split('T')[0];

  function getDate() { return dateInput.value; }

  // ── LOAD ALL ──
  async function loadDay() {
    const date = getDate();
    await Promise.all([loadTasks(date), loadNotes(date), loadSchedule(date)]);
  }

  // ── TASKS ──
  async function loadTasks(date) {
    const res = await fetch(`${API}/daily/tasks?date=${date}`);
    const tasks = await res.json();
    renderTasks(tasks);
  }

  function renderTasks(tasks) {
    const list = document.getElementById('task-list');
    list.innerHTML = '';
    if (!tasks.length) {
      list.innerHTML = '<li style="color:var(--muted);font-size:0.8rem;text-align:center;padding:12px">no tasks yet</li>';
      return;
    }
    tasks.forEach(t => {
      const li = document.createElement('li');
      li.className = 'task-item' + (t.done ? ' done' : '');
      const cb = document.createElement('input');
      cb.type = 'checkbox'; cb.checked = t.done;
      cb.onchange = () => toggleTask(t.id, !t.done);
      const span = document.createElement('span');
      span.textContent = t.text;
      const del = document.createElement('button');
      del.className = 'del'; del.textContent = '✕';
      del.onclick = () => deleteTask(t.id);
      li.append(cb, span, del);
      list.appendChild(li);
    });
  }

  async function addTask() {
    const input = document.getElementById('task-input');
    const val = input.value.trim();
    if (!val) return;
    await fetch(`${API}/daily/tasks`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ date: getDate(), text: val })
    });
    input.value = '';
    loadTasks(getDate());
  }

  async function toggleTask(id, done) {
    await fetch(`${API}/daily/tasks/${id}`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ done })
    });
    loadTasks(getDate());
  }

  async function deleteTask(id) {
    await fetch(`${API}/daily/tasks/${id}`, { method: 'DELETE' });
    loadTasks(getDate());
  }

  // ── NOTES ──
  async function loadNotes(date) {
    const res = await fetch(`${API}/daily/notes?date=${date}`);
    if (res.ok) {
      const data = await res.json();
      document.getElementById('notes-textarea').value = data ? data.body : '';
    }
  }

  async function saveNotes() {
    await fetch(`${API}/daily/notes`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ date: getDate(), body: document.getElementById('notes-textarea').value })
    });
  }

  // ── SCHEDULE ──
  async function loadSchedule(date) {
    const res = await fetch(`${API}/daily/schedule?date=${date}`);
    const slots = await res.json();
    const map = {};
    slots.forEach(s => map[s.hour] = s.text);
    document.querySelectorAll('[data-hour]').forEach(input => {
      input.value = map[input.dataset.hour] || '';
    });
  }

  async function saveSchedule() {
    const date = getDate();
    const inputs = document.querySelectorAll('[data-hour]');
    await Promise.all([...inputs].map(input =>
      fetch(`${API}/daily/schedule`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ date, hour: input.dataset.hour, text: input.value })
      })
    ));
  }

  loadDay();</script>  <script src="../script.js" defer></script></body></html>
