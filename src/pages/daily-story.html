<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Daily Story</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="../style/base.css">
  <link rel="stylesheet" href="../style/components.css">
  <style>
    .journal-date { display: flex; gap: 10px; align-items: center; margin-bottom: 20px; }
    .journal-date input {
      background: var(--tan-light); border: 2px solid var(--tan);
      border-radius: var(--radius-pill); padding: 6px 16px;
      font-family: var(--font-display); font-size: 0.85rem;
      font-weight: 700; color: var(--brown); outline: none;
    }
    .mood-row { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
    .mood-btn {
      background: var(--cream-light); border: 2px solid var(--tan);
      border-radius: var(--radius-pill); padding: 6px 14px;
      font-size: 0.82rem; font-family: var(--font-display);
      font-weight: 700; color: var(--brown-mid); cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }
    .mood-btn:hover, .mood-btn.active { background: var(--accent); border-color: var(--accent); color: white; }
    .journal-body {
      background: var(--warm-white); border: 2px solid var(--tan);
      border-radius: var(--radius-lg); padding: 20px; min-height: 340px;
    }
    .journal-body textarea {
      width: 100%; min-height: 300px; background: transparent;
      border: none; outline: none; resize: none;
      font-family: var(--font-body); font-size: 0.9rem; color: var(--brown); line-height: 2;
      background-image: repeating-linear-gradient(transparent, transparent 31px, var(--tan-light) 31px, var(--tan-light) 32px);
    }
    .journal-body textarea::placeholder { color: var(--muted); opacity: 0.6; }
    .bottom-row { display: flex; justify-content: space-between; align-items: center; margin-top: 16px; }
    .word-count { font-size: 0.75rem; color: var(--muted); font-weight: 600; }
    .status { font-size: 0.75rem; color: var(--accent); font-weight: 600; opacity: 0; transition: opacity 0.3s; }
    .status.show { opacity: 1; }
  </style>
</head>
<body>
<div class="page fade-up">
  <a class="back-nav" href="../index.html">← back</a>
  <div class="page-header">
    <div>
      <h1>🌸 Daily Story</h1>
      <div class="subtitle">write it down, let it go</div>
    </div>
  </div>

  <div class="journal-date">
    <span class="pill-label">📅 date</span>
    <input type="date" id="journal-date" onchange="loadEntry()">
  </div>

  <div>
    <div class="card-title dots">how are you feeling?</div>
    <div class="mood-row" id="mood-row">
      <button class="mood-btn" onclick="setMood(this)">😊 happy</button>
      <button class="mood-btn" onclick="setMood(this)">😌 calm</button>
      <button class="mood-btn" onclick="setMood(this)">😔 sad</button>
      <button class="mood-btn" onclick="setMood(this)">😤 stressed</button>
      <button class="mood-btn" onclick="setMood(this)">🥱 tired</button>
      <button class="mood-btn" onclick="setMood(this)">🤩 excited</button>
    </div>
  </div>

  <div class="card-title dots">today's story</div>
  <div class="journal-body">
    <textarea id="journal-text" placeholder="dear diary, today was..."></textarea>
  </div>

  <div class="bottom-row">
    <span class="word-count" id="word-count">0 words</span>
    <div style="display:flex;align-items:center;gap:12px">
      <span class="status" id="status">saved ✓</span>
      <button class="btn" onclick="saveEntry()">save ☕</button>
    </div>
  </div>
</div>

<script>
  const API = 'http://localhost:8000/api/v1/planner';
  let currentMood = '';

  document.getElementById('journal-date').value = new Date().toISOString().split('T')[0];

  function getDate() { return document.getElementById('journal-date').value; }

  function setMood(btn) {
    document.querySelectorAll('.mood-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentMood = btn.textContent.trim();
  }

  document.getElementById('journal-text').addEventListener('input', function() {
    const words = this.value.trim().split(/\s+/).filter(Boolean).length;
    document.getElementById('word-count').textContent = words + ' words';
  });

  async function loadEntry() {
    const res = await fetch(`${API}/story?date=${getDate()}`);
    if (!res.ok) return;
    const data = await res.json();
    if (!data) { 
      document.getElementById('journal-text').value = '';
      document.querySelectorAll('.mood-btn').forEach(b => b.classList.remove('active'));
      currentMood = '';
      return; 
    }
    document.getElementById('journal-text').value = data.body || '';
    currentMood = data.mood || '';
    document.querySelectorAll('.mood-btn').forEach(b => {
      if (b.textContent.trim() === currentMood) b.classList.add('active');
    });
    const words = data.body.trim().split(/\s+/).filter(Boolean).length;
    document.getElementById('word-count').textContent = words + ' words';
  }

  async function saveEntry() {
    await fetch(`${API}/story`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ date: getDate(), mood: currentMood, body: document.getElementById('journal-text').value })
    });
    const status = document.getElementById('status');
    status.classList.add('show');
    setTimeout(() => status.classList.remove('show'), 2000);
  }

  loadEntry();</script>  <script src="../script.js" defer></script></body></html>
