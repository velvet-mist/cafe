<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Yearly Planner</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="../style/base.css">
  <link rel="stylesheet" href="../style/components.css">
  <style>
    .year-nav { display: flex; align-items: center; gap: 14px; margin-bottom: 24px; }
    .year-nav button {
      background: var(--tan-light); border: 2px solid var(--tan);
      border-radius: var(--radius-pill); width: 32px; height: 32px;
      font-size: 1rem; cursor: pointer; color: var(--brown);
      display: flex; align-items: center; justify-content: center; transition: background 0.15s;
    }
    .year-nav button:hover { background: var(--tan); }
    .year-nav .year-label { font-family: var(--font-display); font-size: 1.5rem; font-weight: 800; color: var(--brown); }
    .months-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
    .month-card { background: var(--cream-light); border: 2px solid var(--tan); border-radius: var(--radius-lg); padding: 12px; box-shadow: var(--shadow-card); }
    .month-name { font-family: var(--font-display); font-size: 0.85rem; font-weight: 800; color: var(--brown); text-align: center; margin-bottom: 8px; }
    .day-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; }
    .day-hdr { font-size: 0.55rem; font-family: var(--font-display); font-weight: 700; color: var(--muted); text-align: center; padding: 2px 0; }
    .day-cell { font-size: 0.6rem; text-align: center; padding: 3px 1px; border-radius: 50%; color: var(--brown-mid); cursor: pointer; transition: background 0.12s, color 0.12s; line-height: 1.4; }
    .day-cell:hover { background: var(--tan); }
    .day-cell.marked { background: var(--accent); color: white; }
    .day-cell.today { border: 1.5px solid var(--accent); font-weight: 700; }
    .day-cell.em
    pty { cursor: default; }
    .day-cell.empty:hover { background: transparent; }
    .legend { display: flex; align-items: center; gap: 16px; margin-top: 18px; flex-wrap: wrap; }
    .legend-item { display: flex; align-items: center; gap: 6px; font-size: 0.75rem; color: var(--brown-mid); font-weight: 600; }
    .legend-dot { width: 12px; height: 12px; border-radius: 50%; }
  </style>
</head>
<body>
<div class="page fade-up">
  <a class="back-nav" href="../index.html">← back</a>
  <div class="page-header">
    <div>
      <h1> Yearly Planner</h1>
      <div class="subtitle">the big picture</div>
    </div>
  </div>

  <div class="year-nav">
    <button onclick="changeYear(-1)">‹</button>
    <span class="year-label" id="year-label">2026</span>
    <button onclick="changeYear(1)">›</button>
  </div>

  <div class="months-grid" id="months-grid"></div>

  <div class="legend">
    <div class="legend-item">
      <div class="legend-dot" style="background:var(--accent)"></div> marked day
    </div>
    <div class="legend-item">
      <div class="legend-dot" style="border:1.5px solid var(--accent);background:transparent"></div> today
    </div>
  </div>
</div>

<script>
  const API = 'http://localhost:8000/api/v1/planner';
  const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const DAYS = ['S','M','T','W','T','F','S'];
  let currentYear = new Date().getFullYear();
  const today = new Date();
  let markedSet = new Set(); // "YYYY-MM-DD"

  async function loadMarkedDays() {
    const res = await fetch(`${API}/yearly?year=${currentYear}`);
    const data = await res.json();
    markedSet = new Set(data.map(d => d.date));
    render();
  }

  async function changeYear(d) {
    currentYear += d;
    await loadMarkedDays();
  }

  async function toggleDay(dateStr) {
    await fetch(`${API}/yearly/toggle`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ date: dateStr })
    });
    if (markedSet.has(dateStr)) markedSet.delete(dateStr);
    else markedSet.add(dateStr);
    render();
  }

  function render() {
    document.getElementById('year-label').textContent = currentYear;
    const grid = document.getElementById('months-grid');
    grid.innerHTML = '';

    MONTHS.forEach((name, mi) => {
      const card = document.createElement('div');
      card.className = 'month-card';

      const title = document.createElement('div');
      title.className = 'month-name';
      title.textContent = name;
      card.appendChild(title);

      const dayGrid = document.createElement('div');
      dayGrid.className = 'day-grid';

      DAYS.forEach(d => {
        const hdr = document.createElement('div');
        hdr.className = 'day-hdr'; hdr.textContent = d;
        dayGrid.appendChild(hdr);
      });

      const firstDay = new Date(currentYear, mi, 1).getDay();
      const daysInMonth = new Date(currentYear, mi + 1, 0).getDate();

      for (let i = 0; i < firstDay; i++) {
        const empty = document.createElement('div');
        empty.className = 'day-cell empty';
        dayGrid.appendChild(empty);
      }

      for (let d = 1; d <= daysInMonth; d++) {
        const mm = String(mi + 1).padStart(2, '0');
        const dd = String(d).padStart(2, '0');
        const dateStr = `${currentYear}-${mm}-${dd}`;
        const isToday = today.getFullYear() === currentYear && today.getMonth() === mi && today.getDate() === d;
        const cell = document.createElement('div');
        cell.className = 'day-cell' + (markedSet.has(dateStr) ? ' marked' : '') + (isToday ? ' today' : '');
        cell.textContent = d;
        cell.onclick = () => toggleDay(dateStr);
        dayGrid.appendChild(cell);
      }

      card.appendChild(dayGrid);
      grid.appendChild(card);
    });
  }

  loadMarkedDays()</script> <script src="../script.js" defer></script></body>\n</html>
